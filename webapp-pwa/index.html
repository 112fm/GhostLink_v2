<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#1E1E1E" />
  <meta name="description" content="GhostLink Club" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./ghost_ava.png" />
  <title>GhostLink Club</title>
  <style>
    body {
      margin: 0;
      background: #1e1e1e;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif;
    }
    .wrap {
      max-width: 560px;
      margin: 0 auto;
      padding: 20px;
    }
    .head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .head img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }
    h1 {
      margin: 0;
      font-size: 30px;
      font-weight: 800;
      letter-spacing: .02em;
    }
    .muted { color: #8a8a8a; }
    .card {
      background: #111;
      border-radius: 14px;
      padding: 14px;
      margin: 16px 0;
    }
    .btn {
      width: 100%;
      height: 50px;
      border-radius: 12px;
      border: 1px solid #b8ff00;
      background: transparent;
      color: #b8ff00;
      font-weight: 700;
      margin: 0 0 10px;
      cursor: pointer;
    }
    .btn-primary {
      background: #b8ff00;
      color: #111;
      border: 0;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <img src="./ghost_ava.png" alt="GhostLink" />
      <h1>GHOSTLINK</h1>
    </div>
    <h2>Закрытый клуб</h2>
    <p class="muted">Доступ только по приглашению. Авторизация выполняется через Telegram.</p>
    <div class="card">
      <strong>Устав клуба (кратко)</strong>
      <p class="muted">Только по инвайтам. Бережем канал и скорость. За приглашенного отвечает пригласивший.</p>
    </div>
    <button id="openTgBtn" class="btn btn-primary">Войти через Telegram</button>
    <button id="shareInviteBtn" class="btn">Поделиться приглашением</button>
    <button id="copyInviteBtn" class="btn">Скопировать ссылку</button>
    <button id="installBtn" class="btn">Установить приложение</button>
    <p id="statusText" class="muted">Ожидайте авторизацию.</p>
  </main>
  <script src="./app.js"></script>
</body>
</html>
